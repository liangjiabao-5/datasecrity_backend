<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑项目 - ENST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #06b6d4;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-sidebar: #0f172a;
            --bg-sidebar-hover: #1e293b;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.35s ease;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-gradient);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 230px;
            background: linear-gradient(180deg, var(--bg-sidebar) 0%, #1e293b 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 10;
            border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
            overflow: hidden;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-gradient);
        }

        .logo {
            padding: 28px 22px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            overflow: hidden;
            background: transparent;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-content {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .logo-title {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .logo-subtitle {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 0.3px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .nav-menu {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 22px;
            margin: 4px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            color: #cbd5e1;
            font-size: 13px;
        }

        .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: #fff;
        }

        .nav-item.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .nav-item i {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .nav-item span {
            flex: 1;
            text-align: left;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: 65px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-title {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
        }

        .header-title i {
            margin-right: 8px;
            font-size: 12px;
        }

        .header-title span:not(:last-child):after {
            content: '/';
            margin: 0 8px;
            color: var(--text-muted);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 14px;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            background: var(--bg-gradient);
        }

        .content-body::-webkit-scrollbar {
            width: 6px;
        }

        .content-body::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .content-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .content-body::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .page-container {
            width: 100%;
            max-width: none;
            margin: 0;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .page-title-wrap {
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            transition: all var(--transition-fast);
            color: var(--text-secondary);
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .page-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0 0 52px;
        }

        .form-container {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 24px;
            width: 100%;
            box-sizing: border-box;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: ' *';
            color: var(--danger-color);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--transition-fast);
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--transition-fast);
            box-sizing: border-box;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 12px center;
            background-repeat: no-repeat;
            background-size: 16px;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--transition-fast);
            box-sizing: border-box;
            min-height: 100px;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <img src="logo.png" alt="ENST">
                </div>
                <div class="logo-content">
                    <div class="logo-title">ENST</div>
                    <div class="logo-subtitle">数据安全风险评估工具</div>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-item" onclick="navigateTo('项目管理页面.html')">
                    <i class="fas fa-folder-open"></i>
                    <span>项目管理</span>
                </div>
                <div class="nav-item" onclick="navigateTo('创建项目页面.html')">
                    <i class="fas fa-plus-circle"></i>
                    <span>创建项目</span>
                </div>
                <div class="nav-item" onclick="navigateTo('评估方案-评估团队.html')">
                    <i class="fas fa-users"></i>
                    <span>评估方案</span>
                </div>
                <div class="nav-item" onclick="navigateTo('信息调研.html')">
                    <i class="fas fa-search"></i>
                    <span>信息调研</span>
                </div>
                <div class="nav-item" onclick="navigateTo('现场测评.html')">
                    <i class="fas fa-check-square"></i>
                    <span>现场测评</span>
                </div>
                <div class="nav-item" onclick="navigateTo('汇总分析.html')">
                    <i class="fas fa-chart-bar"></i>
                    <span>汇总分析</span>
                </div>
                <div class="nav-item" onclick="navigateTo('报告管理.html')">
                    <i class="fas fa-file-pdf"></i>
                    <span>报告管理</span>
                </div>
                <div class="nav-item" onclick="navigateTo('知识库管理页面.html')">
                    <i class="fas fa-book-open"></i>
                    <span>知识库管理</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <div class="header-title">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                        <span>项目管理</span>
                        <span>编辑项目</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span class="user-name">管理员</span>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <div class="page-container">
                    <div class="page-header">
                        <div class="page-title-wrap">
                            <button class="back-btn" onclick="goBack()">
                                <i class="fas fa-arrow-left"></i>
                            </button>
                            <h1 class="page-title">编辑项目</h1>
                        </div>
                    </div>
                    <p class="page-desc">修改项目基本信息</p>

                    <div class="form-container">
                        <input type="hidden" id="project-id" value="">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">项目名称</label>
                                <input type="text" class="form-input" id="project-name" placeholder="请输入项目名称">
                            </div>
                            <div class="form-group">
                                <label class="form-label">项目编号</label>
                                <input type="text" class="form-input" id="project-code" placeholder="系统自动生成" readonly>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">评估单位</label>
                                <input type="text" class="form-input" id="project-organization" placeholder="请输入评估单位名称">
                            </div>
                            <div class="form-group">
                                <label class="form-label">风险评价矩阵</label>
                                <select class="form-select" id="risk-matrix" onchange="updateRelatedOptions()">
                                    <option value="v1">V1评价矩阵</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">评估模板</label>
                                <select class="form-select" id="assessment-template" onchange="updateRelatedOptions()">
                                    <option value="">请选择评估模板</option>
                                    <option value="gb">国标模板</option>
                                    <option value="industry">行业标准模板</option>
                                    <option value="power">电力行业模板</option>
                                    <option value="custom">自定义模板</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">系统类型</label>
                                <select class="form-select" id="reference-case" onchange="updateRelatedOptions()">
                                    <option value="">请选择系统类型</option>
                                    <option value="power-monitor">电力监控系统</option>
                                    <option value="management">管理信息系统</option>
                                    <option value="communication">通信网络设施</option>
                                    <option value="data-resource">数据资源</option>
                                    <option value="other">其他系统平台</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">风险危害程度分析模型</label>
                                <select class="form-select" id="risk-analysis-model" onchange="updateRelatedOptions()">
                                    <option value="">请选择风险分析模型</option>
                                    <option value="default">默认分析模型</option>
                                    <option value="power">电力行业分析模型</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">评分模型</label>
                                <select class="form-select" id="project-model">
                                    <option value="v1">V1评分模型</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">项目描述</label>
                            <textarea class="form-textarea" id="project-desc" placeholder="请输入项目描述"></textarea>
                            <div class="form-hint">请简要描述项目背景、目标和范围（可选）</div>
                        </div>

                        <div class="form-footer">
                            <button class="btn btn-secondary" onclick="goBack()">
                                <i class="fas fa-times"></i>
                                取消
                            </button>
                            <button class="btn btn-primary" onclick="updateProject()">
                                <i class="fas fa-check"></i>
                                保存修改
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        var projects = [
            {
                id: 'ENST-2024-001',
                name: '数据安全评估项目一',
                organization: '测试企业A',
                riskMatrixValue: 'v1',
                templateValue: 'gb',
                caseValue: 'bank',
                riskModelValue: 'power',
                description: '第一个评估项目'
            },
            {
                id: 'ENST-2024-002',
                name: '数据安全评估项目二',
                organization: '测试企业B',
                riskMatrixValue: 'v1',
                templateValue: 'industry',
                caseValue: 'power',
                riskModelValue: 'default',
                description: '第二个评估项目'
            },
            {
                id: 'ENST-2024-003',
                name: '数据安全评估项目三',
                organization: '测试企业C',
                riskMatrixValue: 'v1',
                templateValue: 'power',
                caseValue: 'medical',
                riskModelValue: 'power',
                description: '第三个评估项目'
            },
            {
                id: 'ENST-2024-004',
                name: '数据安全评估项目四',
                organization: '测试企业D',
                riskMatrixValue: 'v1',
                templateValue: 'custom',
                caseValue: 'none',
                riskModelValue: 'default',
                description: '第四个评估项目'
            },
            {
                id: 'ENST-2024-005',
                name: '数据安全评估项目五',
                organization: '测试企业E',
                riskMatrixValue: 'v1',
                templateValue: 'gb',
                caseValue: 'bank',
                riskModelValue: 'power',
                description: '第五个评估项目'
            }
        ];

        function navigateTo(page) {
            window.location.href = page;
        }

        function goBack() {
            window.location.href = '项目管理页面.html';
        }

        function updateRelatedOptions() {
            const riskMatrix = document.getElementById('risk-matrix').value;
            const assessmentTemplate = document.getElementById('assessment-template').value;
            const referenceCase = document.getElementById('reference-case').value;
            const riskAnalysisModel = document.getElementById('risk-analysis-model').value;
        }

        function loadProjectData() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            if (projectId) {
                const project = projects.find(p => p.id === projectId);
                if (project) {
                    document.getElementById('project-id').value = project.id;
                    document.getElementById('project-code').value = project.id;
                    document.getElementById('project-name').value = project.name;
                    document.getElementById('project-organization').value = project.organization;
                    document.getElementById('risk-matrix').value = project.riskMatrixValue || 'v1';
                    document.getElementById('assessment-template').value = project.templateValue || 'gb';
                    document.getElementById('reference-case').value = project.caseValue || 'power-monitor';
                    document.getElementById('risk-analysis-model').value = project.riskModelValue || 'default';
                    document.getElementById('project-desc').value = project.description || '';
                }
            }
        }

        function updateProject() {
            const projectName = document.getElementById('project-name').value;
            if (!projectName) {
                alert('请输入项目名称');
                return;
            }

            const projectOrganization = document.getElementById('project-organization').value;
            if (!projectOrganization) {
                alert('请输入评估单位');
                return;
            }

            const riskMatrix = document.getElementById('risk-matrix');
            const assessmentTemplate = document.getElementById('assessment-template');
            const referenceCase = document.getElementById('reference-case');
            const riskAnalysisModel = document.getElementById('risk-analysis-model');

            const matrixMap = { 'v1': 'V1评价矩阵' };
            const templateMap = { 'gb': '国标模板', 'industry': '行业标准模板', 'power': '电力行业模板', 'custom': '自定义模板' };
            const caseMap = { 'power-monitor': '电力监控系统', 'management': '管理信息系统', 'communication': '通信网络设施', 'data-resource': '数据资源', 'other': '其他系统平台' };
            const riskModelMap = { 'default': '默认分析模型', 'power': '电力行业分析模型' };

            const result = confirm('项目修改成功！\n\n项目信息：\n- 项目名称：' + projectName +
                  '\n- 评估单位：' + projectOrganization +
                  '\n- 风险评价矩阵：' + (matrixMap[riskMatrix.value] || '未选择') +
                  '\n- 评估模板：' + (templateMap[assessmentTemplate.value] || '未选择') +
                  '\n- 系统类型：' + (caseMap[referenceCase.value] || '未选择') +
                  '\n- 风险危害程度分析模型：' + (riskModelMap[riskAnalysisModel.value] || '未选择') +
                  '\n\n是否返回项目列表页面？');

            if (result) {
                goBack();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProjectData);
    </script>
</body>
</html>
